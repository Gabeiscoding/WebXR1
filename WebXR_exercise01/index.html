<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + TS</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/super-hands@4.0.5/dist/super-hands.min.js"></script>

    <script src="src/color-cycle.js"></script> <!--colour-cycle.js-->
<!-- ...existing code... -->
  </head>
  <body>
    <div id="app"></div>
    <p> Hello Everyone! </p>

     <a-scene>
      <a-assets>
      <a-asset-item id="cat" src="public/cat.glb"></a-asset-item>
      </a-assets>

      <a-box position="-1 0.5 -3" 
      rotation="0 45 0" 
      color="#4CC3D9"
      dynamic-body grabbable stretchable draggable 
      color-cycle> <!--physics and colour and interactions added-->
      </a-box>
      
      <a-sphere 
      position="0 1.25 -5" 
      radius="1.25" 
      color="#EF2D5E"
      dynamic-body grabbable stretchable draggable
      color-cycle> <!--physics and colour and interactions added-->
      </a-sphere>

      <a-cylinder position="1 5 -3" 
      radius="0.5" 
      height="3" 
      color="#FFC65D"
      dynamic-body grabbable stretchable draggable
      color-cycle> <!--physics and colour and interactions added-->
      </a-cylinder>

      <a-plane position="0 0 -4" 
      rotation="-90 0 0" 
      width="40" height="20" 
      color="#7BC8A4" 
      static-body>
      </a-plane>


      <a-sky color="#ECECEC"></a-sky>
      <a-entity light="type: ambient; color: #CCC"></a-entity>
      <a-entity light="type: directional; color: green; intensity: 1.0" position="-1 1 0"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
      <a-entity laser-controls="hand: right" super-hands></a-entity>
      </a-entity>
      
      <a-entity
      gltf-model="#cat"
      position="-1 2 -3"
      scale="1 1 1"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
      animation__updown="property: position; dir: alternate; dur: 2000; loop: true; to: -1 3 -3; from: -1 2 -3"
      animation-mixer>
      </a-entity>

      <a-ocean 
      color="aqua" 
      depth="5" 
      width="5" 
      **position="20 30 -50"**>
      </a-ocean>
    </a-scene>
  </body>
</html>
